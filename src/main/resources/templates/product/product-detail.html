<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KINGSPORT - Chi tiết sản phẩm</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: siteHeader('products','')}"></div>

<main class="container page">
  <section class="product-detail-wrap" th:if="${product != null}">
    <div class="product-detail-grid">
      <div class="panel product-detail-gallery">
        <img th:src="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl) ? product.imageUrl : 'https://placehold.co/900x900/png'}"
             th:alt="${product.name}"
             onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='https://placehold.co/900x900/png';}">
      </div>
      <div class="panel product-detail-panel">
        <div class="row between">
          <span class="badge" th:text="${product.category != null ? product.category.name : 'Khác'}"></span>
          <span class="meta" th:text="${product.gender == 'nam' ? 'Nam' : (product.gender == 'nu' ? 'Nữ' : 'Unisex')}"></span>
        </div>
        <h1 class="product-detail-title" th:text="${product.name}"></h1>
        <div class="price" th:text="${#numbers.formatInteger(product.price,0,'COMMA')} + 'đ'"></div>
        <p class="product-detail-desc" th:text="${product.description != null and !#strings.isEmpty(product.description) ? product.description : 'Chưa có mô tả sản phẩm.'}"></p>

        <div class="detail-block">
          <h3>Chọn kích thước</h3>
          <div class="option-grid option-grid-compact" th:if="${sizeStocks != null and !#maps.isEmpty(sizeStocks)}">
            <button class="choice-chip detail-choice size-choice"
                    type="button"
                    th:each="entry, iter : ${sizeStocks.entrySet()}"
                    th:attr="data-size=${entry.key},data-stock=${entry.value}"
                    th:classappend="${iter.index == 0} ? ' active' : ''">
              <span class="choice-chip-label" th:text="${entry.key}"></span>
            </button>
          </div>
          <div class="meta" th:if="${sizeStocks == null or #maps.isEmpty(sizeStocks)}">Sản phẩm chưa có size.</div>
        </div>

        <div class="detail-block">
          <h3>Chọn màu sắc</h3>
          <div class="product-color-grid product-color-grid-compact" th:if="${product.colors != null and #arrays.length(product.colors) > 0}">
            <button class="product-color-card detail-choice color-choice"
                    type="button"
                    th:each="c, iter : ${product.colors}"
                    th:attr="data-color=${c},data-hex=${@productService.resolveColorHex(c)}"
                    th:classappend="${iter.index == 0} ? ' active' : ''">
              <span class="product-color-swatch" th:style="'--swatch:' + ${@productService.resolveColorHex(c)}"></span>
              <span class="product-color-text" th:text="${c}"></span>
            </button>
          </div>
          <div class="meta" th:if="${product.colors == null or #arrays.length(product.colors) == 0}">Sản phẩm chưa có màu.</div>
        </div>

        <div class="detail-block">
          <h3>Thông tin thêm</h3>
          <div class="detail-meta-list">
            <div><strong>Tồn kho theo size:</strong> <span id="selectedSizeLabel" th:text="${defaultSelectedSize}"></span> - <span id="selectedSizeStock" class="selected-size-stock-value" th:text="${defaultSelectedStock}"></span></div>
            <div><strong>Giới tính:</strong> <span th:text="${product.gender == 'nam' ? 'Nam' : (product.gender == 'nu' ? 'Nữ' : 'Unisex')}"></span></div>
          </div>
        </div>

        <div class="row product-detail-actions">
          <a class="btn secondary" th:href="@{/products}">Quay lại</a>
          <form th:action="@{'/cart/add/' + ${product.id}}" method="post" id="addToCartForm">
            <input type="hidden" name="selectedSize" id="selectedSizeInput" th:value="${defaultSelectedSize}">
            <input type="hidden" name="selectedColor" id="selectedColorInput" th:value="${defaultSelectedColor}">
            <button class="btn primary" type="submit" id="addToCartBtn" th:disabled="${defaultSelectedStock <= 0}">
              <span th:text="${defaultSelectedStock <= 0 ? 'Hết hàng' : 'Thêm vào giỏ hàng'}"></span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </section>
</main>

<script>
(() => {
  const sizeButtons = Array.from(document.querySelectorAll('.size-choice'));
  const colorButtons = Array.from(document.querySelectorAll('.color-choice'));
  const selectedSizeStock = document.getElementById('selectedSizeStock');
  const selectedSizeInput = document.getElementById('selectedSizeInput');
  const selectedColorInput = document.getElementById('selectedColorInput');
  const selectedSizeLabel = document.getElementById('selectedSizeLabel');
  const addToCartBtn = document.getElementById('addToCartBtn');
  function updateCartButton(stockValue){
    if(!addToCartBtn) return;
    const stock = Number(stockValue || 0);
    addToCartBtn.disabled = stock <= 0;
    addToCartBtn.textContent = stock <= 0 ? 'Hết hàng' : 'Thêm vào giỏ hàng';
  }
  sizeButtons.forEach((btn, index) => {
    const stock = Number(btn.dataset.stock || 0);
    btn.classList.toggle('is-out', stock <= 0);
    btn.addEventListener('click', () => {
      sizeButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (selectedSizeInput) selectedSizeInput.value = btn.dataset.size || '';
      if (selectedSizeLabel) selectedSizeLabel.textContent = btn.dataset.size || '';
      if (selectedSizeStock) {
        selectedSizeStock.textContent = stock;
        selectedSizeStock.classList.toggle('is-out', stock <= 0);
      }
      updateCartButton(stock);
    });
    if (btn.classList.contains('active') || index === 0) btn.click();
  });
  colorButtons.forEach((btn, index) => {
    btn.addEventListener('click', () => {
      colorButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (selectedColorInput) selectedColorInput.value = btn.dataset.color || '';
    });
    if ((btn.classList.contains('active') || index === 0) && selectedColorInput) selectedColorInput.value = btn.dataset.color || '';
  });
})();
</script>

<script th:src="@{/js/common.js}"></script>
<script>
(() => { enableLiveRefresh({ selector: 'main.container.page', interval: 5000 }); })();
</script>
</body>
</html>
