<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>KINGSPORT - Trang chủ</title>
<link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<div th:replace="~{fragments/layout :: siteHeader('home','')}"></div>
<main class="container page">
  <section class="hero-slider hero-slider-wide" id="heroSlider">
    <div class="hero-slides" id="heroSlides">
      <div class="hero-slide active"><img th:src="@{/images/banner-fit-1.jpg}" alt="Banner thể thao 1"></div>
      <div class="hero-slide"><img th:src="@{/images/banner-fit-2.jpg}" alt="Banner thể thao 2"></div>
      <div class="hero-slide"><img th:src="@{/images/banner-fit-3.jpg}" alt="Banner thể thao 3"></div>
    </div>
    <button class="hero-nav hero-prev" type="button" aria-label="Ảnh trước" onclick="moveHero(-1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <button class="hero-nav hero-next" type="button" aria-label="Ảnh tiếp theo" onclick="moveHero(1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
    <div class="hero-dots" id="heroDots"></div>
  </section>

  <section class="home-collection-wrap">
    <div class="home-collection-card home-toggle-card">
      <div class="page-header simple-header home-collection-head home-toggle-head">
        <div class="home-toggle-tabs" role="tablist" aria-label="Bộ sưu tập trang chủ">
          <button class="home-toggle-tab active" type="button" data-target="featuredGrid">Sản phẩm nổi bật</button>
          <button class="home-toggle-tab" type="button" data-target="bestGrid">Sản phẩm bán chạy</button>
        </div>
        <a class="section-link-more" th:href="@{/products}">Xem tất cả</a>
      </div>
      <div id="featuredGrid" class="grid compact-grid">
        <article class="product-card" th:each="p : ${featuredProducts}">
          <div class="product-media">
            <a class="product-image-wrap product-link-wrap" th:href="@{'/products/' + ${p.id}}">
              <img th:src="${p.imageUrl != null and !#strings.isEmpty(p.imageUrl) ? p.imageUrl : 'https://placehold.co/900x900/png'}" th:alt="${p.name}" onerror="this.src='https://placehold.co/900x900/png'">
              <span class="featured-chip">Nổi bật</span><span class="sold-out-chip" th:if="${p.stock != null and p.stock <= 0}">SOLD OUT</span>
            </a>
          </div>
          <div class="body product-content">
            <div class="row between"><span class="badge" th:text="${p.category != null ? p.category.name : 'Khác'}"></span><span class="meta">Nổi bật</span></div>
            <h3><a class="product-title-link" th:href="@{'/products/' + ${p.id}}" th:text="${p.name}"></a></h3>
            <div class="price" th:text="${#numbers.formatInteger(p.price,0,'COMMA')} + 'đ'"></div>
            <div class="product-color-row" th:if="${p.colors != null and #arrays.length(p.colors) > 0}">
              <span class="product-color-dot" th:each="c,iter : ${p.colors}" th:if="${iter.index < 4}" th:style="'--swatch:' + ${@productService.resolveColorHex(c)}"></span>
            </div>
            <form th:action="@{'/cart/add/' + ${p.id}}" method="post"><input type="hidden" name="selectedSize" th:value="${p.sizes != null and #arrays.length(p.sizes) > 0 ? p.sizes[0] : ''}"><input type="hidden" name="selectedColor" th:value="${p.colors != null and #arrays.length(p.colors) > 0 ? p.colors[0] : ''}"><button class="btn primary" type="submit" th:disabled="${p.stock != null and p.stock <= 0}" th:text="${p.stock != null and p.stock <= 0 ? 'Hết hàng' : 'Thêm giỏ hàng'}">Thêm giỏ hàng</button></form>
          </div>
        </article>
      </div>
      <div id="bestGrid" class="grid compact-grid hidden">
        <article class="product-card" th:each="p : ${bestSellingProducts}">
          <div class="product-media">
            <a class="product-image-wrap product-link-wrap" th:href="@{'/products/' + ${p.id}}">
              <img th:src="${p.imageUrl != null and !#strings.isEmpty(p.imageUrl) ? p.imageUrl : 'https://placehold.co/900x900/png'}" th:alt="${p.name}" onerror="this.src='https://placehold.co/900x900/png'">
            </a>
          </div>
          <div class="body product-content">
            <div class="row between"><span class="badge" th:text="${p.category != null ? p.category.name : 'Khác'}"></span><span class="meta">Bán chạy</span></div>
            <h3><a class="product-title-link" th:href="@{'/products/' + ${p.id}}" th:text="${p.name}"></a></h3>
            <div class="price" th:text="${#numbers.formatInteger(p.price,0,'COMMA')} + 'đ'"></div>
            <div class="product-color-row" th:if="${p.colors != null and #arrays.length(p.colors) > 0}">
              <span class="product-color-dot" th:each="c,iter : ${p.colors}" th:if="${iter.index < 4}" th:style="'--swatch:' + ${@productService.resolveColorHex(c)}"></span>
            </div>
            <form th:action="@{'/cart/add/' + ${p.id}}" method="post"><input type="hidden" name="selectedSize" th:value="${p.sizes != null and #arrays.length(p.sizes) > 0 ? p.sizes[0] : ''}"><input type="hidden" name="selectedColor" th:value="${p.colors != null and #arrays.length(p.colors) > 0 ? p.colors[0] : ''}"><button class="btn primary" type="submit" th:disabled="${p.stock != null and p.stock <= 0}" th:text="${p.stock != null and p.stock <= 0 ? 'Hết hàng' : 'Thêm giỏ hàng'}">Thêm giỏ hàng</button></form>
          </div>
        </article>
      </div>
    </div>
  </section>

  <div class="footer-space"></div>
</main>
<script>
(() => {
  const slides = Array.from(document.querySelectorAll('#heroSlides .hero-slide'));
  const dotsWrap = document.getElementById('heroDots');
  let index = 0;
  function render() {
    slides.forEach((s, i) => s.classList.toggle('active', i === index));
    Array.from(dotsWrap.children).forEach((d, i) => d.classList.toggle('active', i === index));
  }
  window.moveHero = (step) => { index = (index + step + slides.length) % slides.length; render(); };
  slides.forEach((_, i) => {
    const b = document.createElement('button'); b.type = 'button'; b.className = 'hero-dot' + (i === 0 ? ' active' : '');
    b.onclick = () => { index = i; render(); };
    dotsWrap.appendChild(b);
  });
  setInterval(() => window.moveHero(1), 4000);
  document.querySelectorAll('.home-toggle-tab').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.home-toggle-tab').forEach(x => x.classList.remove('active'));
    btn.classList.add('active');
    const target = btn.dataset.target;
    document.getElementById('featuredGrid').classList.toggle('hidden', target !== 'featuredGrid');
    document.getElementById('bestGrid').classList.toggle('hidden', target !== 'bestGrid');
    document.querySelector('.section-link-more').setAttribute('href', '/products');
  }));
})();
</script>
<script th:src="@{/js/common.js}"></script>
</body>
</html>
