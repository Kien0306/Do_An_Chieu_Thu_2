<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KINGSPORT - Đổi quà</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: siteHeader('rewards','')}"></div>
<main class="container page">
  <div class="page-header simple-header"><div><h1>Đổi quà từ điểm</h1></div></div>
  <section class="panel loyalty-panel">
    <div class="row between loyalty-head"><div><h3 style="margin:0">Tích điểm đổi mã giảm giá</h3><div class="meta">Mỗi đơn sẽ được cộng điểm theo hàng nghìn của tổng tiền. Ví dụ 349.000đ = 349 điểm.</div></div><div class="loyalty-balance"><span>Điểm hiện có</span><strong th:text="${rewardPoints}"></strong></div></div>
    <div th:if="${success}" class="notice" th:text="${success}"></div>
    <div th:if="${error}" class="notice error" th:text="${error}"></div>
    <div class="loyalty-rewards">
      <form class="panel" th:each="cp : ${rewardOptions}" th:action="@{/rewards/redeem}" method="post">
        <input type="hidden" name="pointsCost" th:value="${cp.pointsCost}">
        <input type="hidden" name="title" th:value="${cp.title}">
        <input type="hidden" name="couponType" th:value="${cp.couponType}">
        <input type="hidden" name="couponValue" th:value="${cp.couponValue}">
        <input type="hidden" name="maxDiscount" th:value="${cp.maxDiscount}">
        <h4 th:text="${#numbers.formatInteger(cp.pointsCost,0,'COMMA')} + ' điểm'"></h4>
        <p class="meta" th:text="${cp.title}"></p>
        <button class="btn primary" type="submit" th:disabled="${!cp.active or cp.rewardStock <= 0 or rewardPoints < cp.pointsCost}">Đổi quà</button>
      </form>
      <div class="meta" th:if="${#lists.isEmpty(rewardOptions)}">Chưa có mốc đổi điểm nào từ admin.</div>
    </div>
    <div class="panel" style="margin-top:24px;">
      <div class="section-title"><div><h3 style="margin:0">Mã của bạn</h3></div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Mã</th><th>Tên</th><th>Giá trị</th><th>Hết hạn</th></tr></thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(myCoupons)}"><td colspan="4" class="center-cell">Chưa có mã giảm giá cá nhân.</td></tr>
            <tr th:each="cp : ${myCoupons}"><td th:text="${cp.code}"></td><td th:text="${cp.title}"></td><td th:text="${cp.couponType == 'percent' ? cp.couponValue + '%' : #numbers.formatInteger(cp.couponValue,0,'COMMA') + 'đ'}"></td><td th:text="${cp.expiresAt != null ? #temporals.format(cp.expiresAt,'dd/MM/yyyy HH:mm') : 'Không hết hạn'}"></td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="panel" style="margin-top:24px;">
      <div class="section-title"><div><h3 style="margin:0">Lịch sử điểm</h3></div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Thời gian</th><th>Mô tả</th><th class="center-cell">Điểm</th></tr></thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(transactions)}"><td colspan="3" class="center-cell">Chưa có giao dịch điểm.</td></tr>
            <tr th:each="tx : ${transactions}"><td th:text="${#temporals.format(tx.createdAt,'dd/MM/yyyy HH:mm')}"></td><td th:text="${tx.description}"></td><td class="center-cell" th:text="${tx.points}"></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</main>

<script th:src="@{/js/common.js}"></script>
<script>
(() => { enableLiveRefresh({ selector: 'main.container.page', onlyPaths: ['/rewards'], interval: 4000 }); })();
</script>
</body>
</html>
