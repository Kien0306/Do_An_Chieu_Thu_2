<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KINGSPORT - Đơn hàng của tôi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: siteHeader('orders','')}"></div>
<main class="container page">
  <div class="page-header simple-header"><div><h1>Đơn hàng của tôi</h1></div></div>
  <section class="panel">
    <div class="row between" style="margin-bottom:18px;"><div class="meta">Theo dõi lịch sử mua hàng và trạng thái đơn.</div><div class="loyalty-balance"><span>Điểm hiện có</span><strong th:text="${rewardPoints}"></strong></div></div>
    <div id="ordersList">
      <div th:if="${#lists.isEmpty(orders)}" class="panel empty-panel">Bạn chưa có đơn hàng nào.</div>
      <article class="panel" th:each="o,iter : ${orders}" style="margin-bottom:18px;">
        <div class="row between" style="align-items:flex-start; gap:20px;">
          <div>
            <h3 style="margin:0 0 8px;">Đơn <span th:text="${orderNumbers != null and orderNumbers[o.id] != null ? orderNumbers[o.id] : iter.count}"></span></h3>
            <div class="meta" th:text="${#temporals.format(o.createdAt,'dd/MM/yyyy HH:mm')}"></div>
            <div class="meta" th:text="'Người nhận: ' + ${o.customerName} + ' - ' + ${o.customerPhone}"></div>
            <div class="meta" th:text="${o.customerAddress}"></div>
          </div>
          <div style="text-align:right;">
            <div class="badge" th:text="${o.status}"></div>
            <div class="meta" style="margin-top:8px;" th:text="'Thanh toán: ' + ${o.paymentStatus}"></div>
            <div class="meta" th:text="'Giao hàng: ' + ${o.deliveryStatus}"></div>
          </div>
        </div>
        <div style="margin-top:16px;">
          <div class="row between" th:each="item : ${o.items}" style="margin-bottom:8px;">
            <span>
              <span th:text="${item.title}"></span>
              <span th:if="${item.selectedSize != null and !item.selectedSize.isBlank()}" th:text="${' - Size ' + item.selectedSize}"></span>
              <span th:if="${item.colorName != null and !item.colorName.isBlank()}" th:text="${' - ' + item.colorName}"></span>
              <span th:text="${' x' + item.quantity}"></span>
            </span>
            <strong th:text="${#numbers.formatInteger(item.subtotal,0,'COMMA')} + 'đ'"></strong>
          </div>
        </div>
        <div class="row between" style="margin-top:18px; padding-top:18px; border-top:1px solid var(--border);"><div><span class="meta" th:text="${o.couponCode != null and !o.couponCode.isBlank() ? 'Coupon: ' + o.couponCode : 'Không dùng coupon'}"></span></div><div style="text-align:right;"><div class="meta" th:text="'Tạm tính: ' + ${#numbers.formatInteger(o.originalAmount,0,'COMMA')} + 'đ'"></div><div class="meta" th:text="'Phí ship: ' + ${#numbers.formatInteger(o.shippingFee != null ? o.shippingFee : 0,0,'COMMA')} + 'đ'"></div><div class="meta" th:text="'Khoảng cách: ' + ${#numbers.formatDecimal(o.shippingDistanceKm != null ? o.shippingDistanceKm : 0,1,2)} + ' km'"></div><div class="meta" th:text="'Giảm giá: ' + ${#numbers.formatInteger(o.discountAmount,0,'COMMA')} + 'đ'"></div><strong th:text="'Tổng tiền: ' + ${#numbers.formatInteger(o.totalAmount,0,'COMMA')} + 'đ'"></strong></div></div>
      </article>
    </div>
  </section>
</main>

<script th:src="@{/js/common.js}"></script>
<script>
(() => { enableLiveRefresh({ selector: 'main.container.page', onlyPaths: ['/orders'], interval: 4000 }); })();
</script>
</body>
</html>
