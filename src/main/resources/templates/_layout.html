<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="siteHeader(active, keyword)">
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" th:href="@{/}">KING<span>SPORT</span></a>
      <nav class="nav">
        <a th:href="@{/products}" th:classappend="${active=='products'} ? ' active' : ''">Sản phẩm</a>
        <a id="ordersLink" th:classappend="${isLoggedIn} ? '' : ' hidden'" th:href="@{/orders}">Đơn hàng</a>
        <a id="adminLink" th:classappend="${isAdmin} ? ((active=='admin') ? ' active' : '') : ' hidden'" th:href="@{/admin}">Admin</a>
      </nav>
      <div class="search-box">
        <form th:action="@{/products}" method="get" style="display:flex; align-items:center; gap:10px;">
          <input id="searchInput" type="text" name="keyword" th:value="${keyword}" th:placeholder="${active == 'home'} ? 'Tìm kiếm sản phẩm nổi bật...' : 'Tìm kiếm sản phẩm...'"></form>
        <a class="nav-icon-link cart-link" th:href="@{/cart}" title="Giỏ hàng" aria-label="Giỏ hàng">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7h12l-1 12H7L6 7z"/><path d="M9 7a3 3 0 0 1 6 0"/></svg>
          <span class="nav-badge" id="cartCount" th:text="${cartCount}">0</span>
        </a>
        <div th:if="${!isLoggedIn}">
          <a class="icon-button" th:href="@{/login}" title="Đăng nhập" aria-label="Đăng nhập">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
          </a>
        </div>
        <div th:if="${isLoggedIn}">
          <div class="header-icon-stack">
            <div class="user-menu">
              <button class="icon-button" id="userMenuBtn" type="button" title="Tài khoản" aria-label="Tài khoản">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
              </button>
              <div class="user-menu-dropdown hidden" id="userMenuDropdown">
                <a class="user-menu-item" th:href="@{/rewards}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M12 8v13"/><path d="M3 12h18"/><path d="M12 8H7.5a2.5 2.5 0 1 1 0-5c3 0 4.5 5 4.5 5Z"/><path d="M12 8h4.5a2.5 2.5 0 1 0 0-5c-3 0-4.5 5-4.5 5Z"/></svg>
                  <span>Đổi quà</span>
                </a>
              </div>
            </div>
            <form th:action="@{/logout}" method="post">
              <button class="icon-button" type="submit" title="Đăng xuất" aria-label="Đăng xuất">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </header>
  <script>
    (() => {
      const btn = document.getElementById('userMenuBtn');
      const dropdown = document.getElementById('userMenuDropdown');
      if (btn && dropdown) {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          dropdown.classList.toggle('hidden');
        });
        document.addEventListener('click', (e) => {
          if (!dropdown.contains(e.target) && e.target !== btn) dropdown.classList.add('hidden');
        });
      }
    })();
  </script>
</header>

<header th:fragment="adminHeader(active)">
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" th:href="@{/}">KING<span>SPORT</span></a>
      <nav class="nav admin-nav">
        <a th:href="@{/products}">Sản phẩm</a>
        <a th:href="@{/admin}" th:classappend="${active=='dashboard'} ? ' active' : ''">Admin</a>
        <a th:href="@{/admin/revenue}" th:classappend="${active=='revenue'} ? ' active' : ''">Doanh thu</a>
        <a th:href="@{/admin/users}" th:classappend="${active=='users'} ? ' active' : ''">Người dùng</a>
        <a th:href="@{/admin/orders}" th:classappend="${active=='orders'} ? ' active' : ''">Đơn hàng</a>
        <a th:href="@{/admin/inventory}" th:classappend="${active=='inventory'} ? ' active' : ''">Kho</a>
        <a th:href="@{/admin/coupons}" th:classappend="${active=='coupons'} ? ' active' : ''">Coupon</a>
      </nav>
      <div class="search-box admin-search-box">
        <div class="admin-top-summary"><div class="admin-header-name"><strong th:text="${currentUser ?: 'Admin'}">Admin</strong></div></div>
        <form th:action="@{/logout}" method="post">
          <button class="icon-button" type="submit" title="Đăng xuất"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
        </form>
      </div>
    </div>
  </header>
</header>
</body>
</html>
