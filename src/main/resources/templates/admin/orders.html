<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Đơn hàng - Admin</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body>
<div th:replace="~{fragments/layout :: adminHeader('orders')}"></div>
<main class="container" style="padding:28px 0;">
  <div th:if="${success}" class="notice" th:text="${success}"></div>
  <section class="panel"><div class="section-title"><div><h2 style="margin:0">Đơn hàng khách đặt</h2><p class="meta" style="margin:8px 0 0;">Xem người đặt hàng, cập nhật trạng thái và xóa đơn đã thanh toán, đã giao.</p></div></div><div class="table-wrap"><table>
    <thead><tr><th class="center-cell">Mã</th><th>Người đặt hàng</th><th>Sản phẩm</th><th class="center-cell">Thanh toán</th><th>Trạng thái thanh toán</th><th>Giao hàng</th><th class="center-cell">Tổng tiền</th><th class="center-cell">Ngày đặt</th><th class="center-cell">Thao tác</th></tr></thead>
    <tbody>
      <tr th:each="o,iter : ${orders}">
        <td class="center-cell" th:text="${iter.count}"></td>
        <td><strong th:text="${o.customerName}"></strong><div class="meta" th:text="${o.user != null ? o.user.email : o.customerPhone}"></div></td>
        <td><div th:each="item : ${o.items}"><span th:text="${item.title} + ' x ' + ${item.quantity}"></span></div></td>
        <td class="center-cell" th:text="${#strings.toUpperCase(o.paymentMethod)}"></td>
        <td><form th:action="@{'/admin/orders/' + ${o.id} + '/payment-status'}" method="post"><select name="paymentStatus" onchange="this.form.submit()"><option value="pending" th:selected="${o.paymentStatus == 'pending'}">Chưa thanh toán</option><option value="paid" th:selected="${o.paymentStatus == 'paid'}">Đã thanh toán</option></select></form></td>
        <td><form th:action="@{'/admin/orders/' + ${o.id} + '/delivery-status'}" method="post"><select name="deliveryStatus" onchange="this.form.submit()"><option value="pending" th:selected="${o.deliveryStatus == 'pending'}">Chưa giao</option><option value="shipping" th:selected="${o.deliveryStatus == 'shipping'}">Đang giao</option><option value="delivered" th:selected="${o.deliveryStatus == 'delivered'}">Đã giao</option></select></form></td>
        <td class="center-cell" th:text="${#numbers.formatInteger(o.totalAmount,0,'COMMA')} + 'đ'"></td>
        <td class="center-cell" th:text="${#temporals.format(o.createdAt,'HH:mm:ss dd/M/yyyy')}"></td>
        <td class="center-cell"><a class="btn danger btn-sm" th:href="@{'/admin/orders/' + ${o.id} + '/delete'}">Xóa</a></td>
      </tr>
    </tbody>
  </table></div></section>
</main>
<script th:src="@{/js/common.js}"></script>
<script>
(() => { enableLiveRefresh({ selector: 'main.container', onlyPaths: ['/admin/orders'], interval: 4000 }); })();
</script>

<script th:src="@{/js/common.js}"></script>
<script>
(() => { enableLiveRefresh({ selector: 'main.container', onlyPaths: ['/admin/orders'], interval: 4000 }); })();
</script>
</body></html></html>
