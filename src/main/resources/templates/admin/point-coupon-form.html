<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${pageTitle}"></title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body>
<div th:replace="~{fragments/layout :: adminHeader('dashboard')}"></div>
<main class="page"><div class="container"><section class="panel coupon-form-panel">
  <div class="page-header"><div><h1 th:text="${pageTitle}"></h1><p>Tạo hoặc cập nhật mốc đổi điểm riêng cho hệ thống tích điểm.</p></div><a class="btn secondary" th:href="@{/admin/coupons/points}">Quay lại mã đổi điểm</a></div>
  <form th:action="@{/admin/coupons/points/save}" method="post" class="admin-form-grid admin-form-grid-3">
    <input type="hidden" name="id" th:value="${coupon.id}">
    <div class="form-group"><label>Loại</label><select name="couponType"><option value="fixed" th:selected="${coupon.couponType == 'fixed'}">Giảm tiền cố định</option><option value="percent" th:selected="${coupon.couponType == 'percent'}">Giảm theo %</option></select></div>
    <div class="form-group"><label>Giá trị</label><input type="number" name="couponValue" th:value="${coupon.couponValue}" min="0" required></div>
    <div class="form-group"><label>Điểm cần đổi</label><input type="number" name="pointsCost" th:value="${coupon.pointsCost}" min="0" required></div>
    <div class="form-group"><label>Giảm tối đa</label><input type="number" name="maxDiscount" th:value="${coupon.maxDiscount}" min="0"></div>
    <div class="form-group"><label>Số mã còn lại</label><input type="number" name="rewardStock" th:value="${coupon.rewardStock}" min="0"></div>
    <div class="form-group checkbox-row" style="grid-column:1/-1;"><input type="checkbox" name="active" value="true" th:checked="${coupon.active}"><label>Đang hoạt động</label></div>
    <div class="form-actions"><button class="btn primary" type="submit">Lưu mã đổi điểm</button><a class="btn secondary" th:href="@{/admin/coupons/points}">Hủy</a></div>
  </form>
</section></div></main></body></html>
