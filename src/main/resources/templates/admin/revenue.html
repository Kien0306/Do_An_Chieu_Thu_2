<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Doanh thu - KINGSPORT</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body>
<div th:replace="~{fragments/layout :: adminHeader('revenue')}"></div>
<main class="container page revenue-page-final">
  <section class="panel revenue-stack-card final-chart-card">
    <div class="chart-card-head final-chart-head"><h3>Doanh thu 7 ngày gần nhất</h3><span th:text="${#numbers.formatInteger(revenueTotal,0,'COMMA')} + 'đ'"></span></div>
    <div class="final-chart-stage">
      <div class="final-chart-axis"><span th:text="${dailyScale.topLabel}"></span><span th:text="${dailyScale.middleLabel}"></span><span>0</span></div>
      <div class="final-chart-bars no-scroll-chart">
        <div class="final-chart-bar" th:each="bar : ${dailyRevenue}" th:style="'--bar-height:' + ${bar.heightPercent} + '%'">
          <div class="final-chart-track">
            <strong th:text="${#numbers.formatInteger(bar.total,0,'COMMA')} + 'đ'"></strong>
            <div class="final-chart-fill" th:style="'height:' + ${bar.heightPercent} + '%' "></div>
          </div>
          <span th:text="${bar.label}"></span>
        </div>
      </div>
    </div>
  </section>

  <section class="panel revenue-stack-card final-chart-card monthly-final-card">
    <div class="chart-card-head final-chart-head"><h3>Doanh thu theo tháng</h3><span th:text="${#numbers.formatInteger(revenueTotal,0,'COMMA')} + 'đ'"></span></div>
    <div class="final-chart-stage monthly-final-stage">
      <div class="final-chart-axis"><span th:text="${monthlyScale.topLabel}"></span><span th:text="${monthlyScale.middleLabel}"></span><span>0</span></div>
      <div class="final-chart-bars monthly-final-bars no-scroll-chart">
        <div class="final-chart-bar" th:each="bar : ${monthlyRevenue}" th:style="'--bar-height:' + ${bar.heightPercent} + '%'">
          <div class="final-chart-track monthly-track">
            <strong th:text="${#numbers.formatInteger(bar.total,0,'COMMA')} + 'đ'"></strong>
            <div class="final-chart-fill monthly-fill" th:style="'height:' + ${bar.heightPercent} + '%' "></div>
          </div>
          <span th:text="${bar.label}"></span>
        </div>
      </div>
    </div>
  </section>

  <section class="panel revenue-stack-card best-selling-full-final">
    <div class="chart-card-head final-chart-head"><h3>Mặt hàng bán chạy</h3><span th:text="${#lists.size(topSellingProducts)} + ' sản phẩm'"></span></div>
    <div class="best-selling-full-list">
      <div class="best-selling-full-row" th:each="item : ${topSellingProducts}">
        <div class="best-selling-copy"><strong th:text="${item.name}"></strong><span th:text="${item.category}"></span></div>
        <div class="best-selling-meter"><div class="best-selling-meter-fill" th:style="'width:' + ${item.widthPercent} + '%' "></div></div>
        <strong class="best-selling-qty" th:text="${item.soldCount}"></strong>
      </div>
    </div>
  </section>
</main></body></html>
