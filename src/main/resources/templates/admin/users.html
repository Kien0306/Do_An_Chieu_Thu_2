<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Người dùng - Sport Store</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body>
<div th:replace="~{fragments/layout :: adminHeader('users')}"></div>
<main class="container" style="padding:28px 0;">
  <div th:if="${success}" class="notice" th:text="${success}"></div>
  <section class="panel admin-users-table"><div class="section-title"><div><h2 style="margin:0">Người dùng</h2><p class="meta" style="margin:8px 0 0;">Quản lý trạng thái tài khoản khách hàng.</p></div></div><div class="table-wrap"><table><thead><tr><th>USERNAME</th><th>HỌ TÊN</th><th>EMAIL</th><th>ROLE</th><th>TRẠNG THÁI</th><th>THAO TÁC</th></tr></thead><tbody><tr th:each="u : ${users}"><td th:text="${u.username}"></td><td th:text="${u.fullName}"></td><td th:text="${u.email}"></td><td th:text="${u.role != null ? (u.role.name == 'ROLE_ADMIN' ? 'ADMIN' : 'CUSTOMER') : ''}"></td><td th:text="${u.enabled ? 'Hoạt động' : 'Đã khóa'}"></td><td><div class="row" th:if="${u.role == null || u.role.name != 'ROLE_ADMIN'}"><form th:if="${u.enabled}" th:action="@{'/admin/users/' + ${u.id} + '/lock'}" method="post"><button class="btn secondary btn-sm" type="submit">Khóa</button></form><form th:if="${!u.enabled}" th:action="@{'/admin/users/' + ${u.id} + '/unlock'}" method="post"><button class="btn success btn-sm" type="submit">Mở khóa</button></form><form th:action="@{'/admin/users/' + ${u.id} + '/delete'}" method="post"><button class="btn danger btn-sm" type="submit">Xóa</button></form></div><span class="meta" th:if="${u.role != null && u.role.name == 'ROLE_ADMIN'}">Tài khoản hệ thống</span></td></tr></tbody></table></div></section>
</main></body></html>
