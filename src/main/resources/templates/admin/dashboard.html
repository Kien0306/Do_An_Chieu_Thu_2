<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin - KINGSPORT</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<div th:replace="~{fragments/layout :: adminHeader('dashboard')}"></div>
<main class="container page admin-dashboard-page-final">
  <div class="kpi-grid kpi-grid-admin compact-kpis-final">
    <div class="kpi"><div class="meta">Sản phẩm</div><div class="number" th:text="${#lists.size(products)}"></div></div>
    <div class="kpi"><div class="meta">Danh mục</div><div class="number" th:text="${#lists.size(categories)}"></div></div>
  </div>

  <section class="panel category-board-final">
    <div class="page-header"><div><h2>Danh mục</h2><p>Thêm và sửa danh mục đã tách ra trang riêng.</p></div><a class="btn primary" th:href="@{/admin/categories/new}">Thêm danh mục</a></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>TÊN DANH MỤC</th><th>THAO TÁC</th></tr></thead>
        <tbody>
        <tr th:each="c : ${categories}">
          <td th:text="${c.name}"></td>
          <td>
            <div class="row">
              <a class="btn secondary btn-sm" th:href="@{'/admin/categories/' + ${c.id} + '/edit'}">Sửa</a>
              <form th:action="@{'/admin/categories/' + ${c.id} + '/delete'}" method="post">
                
                <button class="btn danger btn-sm" type="submit">Xóa</button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>

  <section class="panel promo-entry-panel promo-entry-panel-final">
    <div class="page-header"><div><h2>Khuyến mãi</h2><p>Vào từ trang Admin để quản lý riêng mã giảm giá và mã đổi điểm.</p></div></div>
    <div class="promo-entry-grid promo-entry-grid-final">
      <a class="promo-entry-card promo-entry-card-final" th:href="@{/admin/coupons/payment}"><span>MÃ GIẢM GIÁ</span><strong>Quản lý coupon thanh toán</strong></a>
      <a class="promo-entry-card promo-entry-card-final" th:href="@{/admin/coupons/points}"><span>MÃ ĐỔI ĐIỂM</span><strong>Quản lý quà đổi bằng điểm</strong></a>
    </div>
  </section>
</main>
</body></html>
